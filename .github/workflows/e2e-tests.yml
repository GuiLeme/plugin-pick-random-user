name: Automated tests

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  e2e-tests:
    name: Build, publish & test
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute S3 path
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "S3_PATH=plugins/ci/pick-random-user-plugin/pr-${{ github.event.number }}/dist" >> $GITHUB_ENV
          else
            echo "S3_PATH=plugins/ci/pick-random-user-plugin/pr-manual-${{ github.run_id }}/dist" >> $GITHUB_ENV
          fi

      - name: Save PR comment data
        if: github.event_name == 'pull_request'
        run: |
          echo "${{ github.event.number }}" > pr_number
          echo "${{ github.run_id }}" > workflow_id

      - name: Upload PR comment data artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: pr-comment-data
          path: |
            pr_number
            workflow_id

      # ── Step 1: Build ────────────────────────────────────────────────────────

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build-bundle

      # ── Step 2: Publish to S3 ────────────────────────────────────────────────

      - name: Publish plugin to S3
        env:
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_PATH: ${{ env.S3_PATH }}
        run: bash scripts/publish-plugin-to-s3.sh

      # ── Step 3: Run tests ────────────────────────────────────────────────────

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        env:
          CI: 'true'
          BBB_URL: ${{ secrets.BBB_URL }}
          BBB_SECRET: ${{ secrets.BBB_SECRET }}
          PICK_RANDOM_USER_PLUGIN_URL: ${{ secrets.S3_ENDPOINT_URL }}/${{ secrets.S3_BUCKET }}/${{ env.S3_PATH }}/manifest.json
          TIMEOUT_MULTIPLIER: '2'
        run: npm run test-chromium-ci

      # ── Artifacts ────────────────────────────────────────────────────────────

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report
          path: blob-report/
          retention-days: 10
